<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Volunteer Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
    }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    section {
      background: white;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h2 { font-size: 20px; margin-bottom: 16px; color: #1a73e8; }
    .event-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-card .event-name { font-weight: 600; }
    .event-card .event-meta { font-size: 13px; color: #666; margin-top: 4px; }
    input, select {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus { border-color: #1a73e8; }
    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    .msg { padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
    .success { background: #e6f4ea; color: #2d6a4f; }
    .error   { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>

<header>🌱 Campus Volunteer Portal</header>

<div class="container">

  <!-- EVENTS SECTION -->
  <section>
    <h2>📋 Available Events</h2>
    <div id="events-list">Loading...</div>
  </section>

  <!-- REGISTER SECTION -->
  <section>
    <h2>📝 Register as Volunteer</h2>
    <input type="text"  id="reg-name"  placeholder="Your full name">
    <input type="email" id="reg-email" placeholder="Your email">
    <select id="reg-event">
      <option value="">-- Select an event --</option>
    </select>
    <button onclick="register()">Register</button>
    <div id="reg-msg" class="msg"></div>
  </section>

  <!-- ADMIN: ADD EVENT -->
  <section>
    <h2>⚙️ Admin — Add New Event</h2>
    <input type="text" id="new-event-name"     placeholder="Event name">
    <input type="date" id="new-event-date">
    <input type="text" id="new-event-location" placeholder="Location">
    <button onclick="addEvent()">Add Event</button>
    <div id="add-msg" class="msg"></div>
  </section>

</div>

<script>
const API = 'http://localhost:3000';

// ── Load events ──────────────────────────────────────────
async function loadEvents() {
  try {
    const res  = await fetch(`${API}/events`);
    const data = await res.json();
    const list = document.getElementById('events-list');
    const sel  = document.getElementById('reg-event');

    list.innerHTML = data.map(e => `
      <div class="event-card">
        <div>
          <div class="event-name">${e.name}</div>
          <div class="event-meta">📅 ${e.date} &nbsp;|&nbsp; 📍 ${e.location}</div>
        </div>
      </div>
    `).join('');

    sel.innerHTML = '<option value="">-- Select an event --</option>' +
      data.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  } catch(err) {
    document.getElementById('events-list').innerHTML =
      '<p style="color:red">Could not connect to server. Make sure server.js is running.</p>';
  }
}

// ── Register ─────────────────────────────────────────────
async function register() {
  const name    = document.getElementById('reg-name').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const eventId = document.getElementById('reg-event').value;
  const msg     = document.getElementById('reg-msg');

  if (!name || !email || !eventId) {
    showMsg(msg, 'Please fill all fields and select an event.', 'error');
    return;
  }

  const res  = await fetch(`${API}/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, eventId: parseInt(eventId) })
  });
  const data = await res.json();
  showMsg(msg, data.message || 'Registered!', 'success');
  document.getElementById('reg-name').value  = '';
  document.getElementById('reg-email').value = '';
  document.getElementById('reg-event').value = '';
}

// ── Add Event ────────────────────────────────────────────
async function addEvent() {
  const name     = document.getElementById('new-event-name').value.trim();
  const date     = document.getElementById('new-event-date').value;
  const location = document.getElementById('new-event-location').value.trim();
  const msg      = document.getElementById('add-msg');

  if (!name) { showMsg(msg, 'Event name is required.', 'error'); return; }

  const res  = await fetch(`${API}/events`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, date, location })
  });
  const data = await res.json();
  showMsg(msg, data.message || 'Event added!', 'success');
  document.getElementById('new-event-name').value     = '';
  document.getElementById('new-event-date').value     = '';
  document.getElementById('new-event-location').value = '';
  loadEvents();
}

function showMsg(el, text, type) {
  el.textContent  = text;
  el.className    = `msg ${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

loadEvents();
</script>

</body>
</html>
